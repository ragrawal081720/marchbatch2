version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: nginx-web-server
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    networks:
      - webnet
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  webnet:
    driver: bridge

# Optional: Add volume for persistent data
volumes:
  nginx-data:
    driver: local
