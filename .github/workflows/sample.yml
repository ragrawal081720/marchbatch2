name: Multi-Stage Workflow with Job Outputs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stage1-build:
    name: Stage 1 - Build with JSON
    runs-on: ubuntu-latest
    outputs:
      image_mapping: ${{ steps.build.outputs.image_mapping }}
    
    steps:
      - name: Build application
        id: build
        run: |
          # Use heredoc delimiter for proper cross-job transfer
          echo "image_mapping<<EOF" >> $GITHUB_OUTPUT
          echo '{"artifact":"myapp.zip","version":"1.0.0"}' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: print JSON output (within same job)
        run: |
          echo "Testing within same job:"
          echo '${{ steps.build.outputs.image_mapping }}'
          
  stage2-test:
    name: Stage 2 - Test and Print JSON
    runs-on: ubuntu-latest
    needs: stage1-build
    
    steps:
      - name: Print JSON outputs from Stage 1
        run: |
          echo "=== Received from Stage 1 ==="
          echo "Raw JSON: ${{ needs.stage1-build.outputs.image_mapping }}"
          echo ""
          echo "=== Parsing with fromJSON ==="
          echo "Artifact: ${{ fromJSON(needs.stage1-build.outputs.image_mapping).artifact }}"
          echo "Version: ${{ fromJSON(needs.stage1-build.outputs.image_mapping).version }}"