name: Multi-Stage Workflow with Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stage1-build:
    name: Stage 1 - Build with JSON
    runs-on: ubuntu-latest
    outputs:
      image_mapping: ${{ steps.build.outputs.image_mapping }}
      # ⚠️ WARNING: This output contains a secret!
    
    steps:
      - name: Build application
        id: build
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}  # ⚠️ Will be exposed in output
        run: |
          # Use secret in this job
          echo "Using secret: ${MY_SECRET:0:3}***"
          
          # Create output with secret (NOT RECOMMENDED)
          ARTIFACT_NAME="myapp.zip"
          VERSION="1.0.0"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_NUMBER="${{ github.run_number }}"
          COMMIT_SHA="${{ github.sha }}"
          
          echo "image_mapping<<EOF" >> $GITHUB_OUTPUT
          echo "{\"artifact\":\"$ARTIFACT_NAME\",\"version\":\"$VERSION\",\"timestamp\":\"$TIMESTAMP\",\"build\":\"$BUILD_NUMBER\",\"commit\":\"${COMMIT_SHA:0:7}\",\"secret\":\"$MY_SECRET\"}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  stage2-test:
    name: Stage 2 - Test and Print JSON
    runs-on: ubuntu-latest
    needs: stage1-build
    
    steps:
      - name: Print JSON outputs from Stage 1
        run: |
          echo "=== Received from Stage 1 ==="
          echo "Raw JSON: ${{ needs.stage1-build.outputs.image_mapping }}"
          echo "Artifact: ${{ fromJSON(needs.stage1-build.outputs.image_mapping).artifact }}"
          echo "Version: ${{ fromJSON(needs.stage1-build.outputs.image_mapping).version }}"
          echo "Secret: ${{ fromJSON(needs.stage1-build.outputs.image_mapping).secret }}"