name: Multi-Stage Workflow with Job Outputs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stage1-build:
    name: Stage 1 - Build with JSON
    runs-on: ubuntu-latest
    outputs:
      image_mapping: ${{ steps.build.outputs.image_mapping }}
    
    steps:
      - name: Build application
        id: build
        run: |
          pass="${{ secrets.MY_SECRET }}"

          # Define variables
          ARTIFACT_NAME="myapp.zip"
          VERSION="1.0.0"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_NUMBER="${{ github.run_number }}"
          COMMIT_SHA="${{ github.sha }}"
          
          # Use heredoc delimiter with variable interpolation
          echo "image_mapping<<EOF" >> $GITHUB_OUTPUT
          echo "{\"pass\":\"$pass\",\"artifact\":\"$ARTIFACT_NAME\",\"version\":\"$VERSION\",\"timestamp\":\"$TIMESTAMP\",\"build\":\"$BUILD_NUMBER\",\"commit\":\"${COMMIT_SHA:0:7}\"}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Print to verify
          echo "Created mapping with variables"
      - name: print JSON output (within same job)
        run: |
          echo "Testing within same job:"
          echo '${{ steps.build.outputs.image_mapping }}'
      - name: Use action from another repository
        uses: jatinbhalla1991/febatch2/.github/actions@main
        with:
            # Add any inputs your action requires
          message: '${{ steps.build.outputs.image_mapping }}'
        
          
