name: Multi-Stage Workflow with ACR Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stage1-build:
    name: Stage 1 - Build with JSON
    runs-on: ubuntu-latest
    outputs:
      image_mapping: ${{ steps.build.outputs.image_mapping }}
    
    steps:
      - name: Build application
        id: build
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          # Debug: Check if secrets are available
          echo "Checking secrets..."
          if [ -z "$MY_SECRET" ]; then
            echo "WARNING: MY_SECRET is empty"
            MY_SECRET="default-secret"
          fi
          
          # Create variables
          ARTIFACT_NAME="myapp.zip"
          VERSION="1.0.0"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_NUMBER="${{ github.run_number }}"
          COMMIT_SHA="${{ github.sha }}"
          
          # Create JSON output with heredoc (secrets will be in output - be careful!)
          cat >> $GITHUB_OUTPUT << 'HEREDOC_EOF'
          image_mapping<<JSON_EOF
          {
            "artifact": "myapp.zip",
            "version": "1.0.0",
            "timestamp": "2024-01-01T00:00:00Z",
            "build": "123",
            "commit": "abc1234",
            "acr_username": "ACR_USER_PLACEHOLDER",
            "acr_password": "ACR_PASS_PLACEHOLDER",
            "acr_registry": "ACR_REG_PLACEHOLDER"
          }
          JSON_EOF
          HEREDOC_EOF
          
          # Now replace placeholders with actual values
          sed -i "s|ACR_USER_PLACEHOLDER|$ACR_USERNAME|g" $GITHUB_OUTPUT
          sed -i "s|ACR_PASS_PLACEHOLDER|$ACR_PASSWORD|g" $GITHUB_OUTPUT
          sed -i "s|ACR_REG_PLACEHOLDER|$ACR_REGISTRY|g" $GITHUB_OUTPUT
          
          echo "Output created successfully"

  stage2-test:
    name: Stage 2 - Use ACR Credentials
    runs-on: ubuntu-latest
    needs: stage1-build
    
    steps:
      - name: Print and use JSON outputs from Stage 1
        run: |
          echo "=== Received from Stage 1 ==="
          echo "Raw JSON: ${{ needs.stage1-build.outputs.image_mapping }}"
          echo ""
          